version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    container_name: backend_container
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres

  interface:
    build:
      context: ./interface
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ./interface/.env
    container_name: interface_container
    volumes:
      - ./interface:/app
      - /app/node_modules
    depends_on:
      - backend

  redis:
    image: redis:7
    container_name: redis_container
    ports:
      - "6373:6373"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_pgvector
    env_file:
      - .env
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
